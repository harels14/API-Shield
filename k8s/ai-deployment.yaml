apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: api-shield
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: harels12/ai-service:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: api-shield
spec:
  selector:
    app: ai-service
  ports:
    - port: 8000
      targetPort: 8000
