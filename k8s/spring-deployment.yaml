apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-service
  namespace: api-shield
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-service
  template:
    metadata:
      labels:
        app: spring-service
    spec:
      containers:
        - name: spring-service
          image: harels12/spring-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: AI_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AI_SERVICE_URL
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: spring-service
  namespace: api-shield
spec:
  type: ClusterIP
  selector:
    app: spring-service
  ports:
    - port: 80
      targetPort: 8080
